<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, user-scalable=no" />
        <title>Liikennematto</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <style>
            #lm-overlay div {
                -webkit-touch-callout: none;
                -webkit-user-select: none;
                user-select: none;
            }
        </style>
    </head>
    <body>
        <script src="https://unpkg.com/fflate@0.8.2"></script>
        <script src="liikennematto.min.js"></script>
        <script>
            function parseSavegameFromUrl() {
                const hash = window.location.hash;

                if (!hash || hash.length <= 1) {
                    return null;
                }

                try {
                    const base64Data = hash.substring(1); // Remove the # prefix
                    const binaryString = atob(base64Data);
                    const bytes = new Uint8Array(binaryString.length);

                    for (let i = 0; i < binaryString.length; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }

                    const decompressed = fflate.decompressSync(bytes);
                    const asStr = fflate.strFromU8(decompressed);

                    return JSON.parse(asStr);
                } catch (e) {
                    console.error("Failed to parse savegame from URL:", e);
                    return null;
                }
            }

            var app = Elm.Main.init({
                flags: {
                    runtimeEnvironment: "release",
                    time: Date.now(),
                    savegameData: parseSavegameFromUrl(),
                },
            });

            app.ports.updateSavegameUrl.subscribe(function (savegameJson) {
                try {
                    const jsonString = JSON.stringify(savegameJson);
                    const bytes = fflate.strToU8(jsonString);
                    const compressed = fflate.compressSync(bytes);

                    const len = compressed.byteLength;
                    let binary = "";

                    for (let i = 0; i < len; i++) {
                        binary += String.fromCharCode(compressed[i]);
                    }

                    const base64Data = btoa(binary);

                    history.replaceState(null, "", "#" + base64Data);
                } catch (e) {
                    console.error("Failed to update savegame URL:", e);
                }
            });

            app.ports.clearSavegameUrl.subscribe(function () {
                // Preserve current game in history before clearing
                if (window.location.hash) {
                    history.pushState(null, "", window.location.href);
                }
                history.replaceState(
                    null,
                    "",
                    window.location.pathname + window.location.search,
                );
            });

            window.addEventListener("hashchange", function () {
                if (!window.location.hash || window.location.hash === "#") {
                    app.ports.onHashCleared.send(null);
                } else {
                    const savegameJson = parseSavegameFromUrl();
                    if (savegameJson) {
                        app.ports.onHashChange.send(savegameJson);
                    }
                }
            });

            const AudioContext =
                window.AudioContext || window.webkitAudioContext;
            const context = new AudioContext();
            const roadGainNode = context.createGain();
            const roadStereoPannerNode = context.createStereoPanner();
            const lotGainNode = context.createGain();
            const lotStereoPannerNode = context.createStereoPanner();
            let soundSource_road = null;
            let roadSoundLabel = null;
            let soundSource_lot = null;
            let sounds = {};

            Promise.all([
                getBuffer("init"),
                getBuffer("build_road_start"),
                getBuffer("build_road_end"),
                getBuffer("destroy_road"),
                getBuffer("build_lot"),
            ]).then(initAudio);

            roadGainNode.gain.value = 0.4;
            roadStereoPannerNode.pan.value = -0.25;
            lotGainNode.gain.value = 0.25;
            lotStereoPannerNode.pan.value = 0.25;

            roadGainNode
                .connect(roadStereoPannerNode)
                .connect(context.destination);
            lotGainNode
                .connect(lotStereoPannerNode)
                .connect(context.destination);

            function initAudio() {
                app.ports.onAudioInitComplete.send("__audio_init_complete__");

                app.ports.requestAudio.subscribe(function (sound) {
                    if (context.state === "suspended") {
                        context.resume();
                    }

                    sound && playSound(sound);
                });

                document.body.addEventListener(
                    "pointerenter",
                    function handler() {
                        playSound("init");
                        document.body.removeEventListener(
                            "pointerenter",
                            arguments.callee,
                        );
                    },
                );
            }

            function getBuffer(soundLabel) {
                const url = "sounds/" + soundLabel + ".mp3";

                return fetch(url)
                    .then((response) => {
                        if (!response.ok) {
                            throw new Error(
                                `Could not load a sound, status = ${response.status}`,
                            );
                        }
                        return response.arrayBuffer();
                    })
                    .then((buffer) => context.decodeAudioData(buffer))
                    .then((decoded) => (sounds[soundLabel] = decoded))
                    .catch((error) => console.log(error));
            }

            const fadeOutDurationMs = 30;

            function playSound(soundLabel) {
                const buffer = sounds[soundLabel];

                if (!buffer) {
                    return;
                }

                const isLotSound = soundLabel === "build_lot";
                const oldSource = isLotSound
                    ? soundSource_lot
                    : soundSource_road;

                const shouldFadeOut =
                    soundLabel === "build_road_start" &&
                    roadSoundLabel === "build_road_end";

                stopSource(oldSource, shouldFadeOut);

                const source = context.createBufferSource();
                const sourceGain = context.createGain();

                source.buffer = buffer;
                source.__gainNode = sourceGain;

                if (isLotSound) {
                    soundSource_lot = source;
                    sourceGain.connect(lotGainNode);
                    source.onended = function () {
                        soundSource_lot = null;
                    };
                } else {
                    soundSource_road = source;
                    roadSoundLabel = soundLabel;
                    sourceGain.connect(roadGainNode);
                    source.onended = function () {
                        soundSource_road = null;
                        roadSoundLabel = null;
                    };
                }

                source.connect(sourceGain);
                source.start(0);
            }

            function stopSource(source, shouldFadeOut) {
                if (!source) {
                    return;
                }

                source.onended = null;

                if (shouldFadeOut && source.__gainNode) {
                    const fadeDuration = fadeOutDurationMs / 1000;
                    const now = context.currentTime;
                    const gain = source.__gainNode;

                    gain.gain.setValueAtTime(gain.gain.value, now);
                    gain.gain.linearRampToValueAtTime(0, now + fadeDuration);
                    source.stop(context.currentTime + fadeDuration);
                } else {
                    source.stop(0);
                }
            }
        </script>
    </body>
</html>
